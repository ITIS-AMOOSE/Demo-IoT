# ================================================
# Mosquitto Config - Pha 3: BẢO MẬT NÂNG CAO (TLS + Auth)
# ================================================
# Kết hợp TLS encryption với username/password authentication.

# Không cho phép anonymous
allow_anonymous false

# Lắng nghe trên port TLS 8883
listener 8883 0.0.0.0

# === Cấu hình TLS ===
# CA certificate (dùng để verify)
cafile /mosquitto/certs/ca.crt

# Server certificate
certfile /mosquitto/certs/server.crt

# Server private key
keyfile /mosquitto/certs/server.key

# Yêu cầu TLS v1.2 trở lên
tls_version tlsv1.2

# === Cấu hình Auth ===
password_file /mosquitto/config/passwords.txt
acl_file /mosquitto/config/acl.txt

# Log
log_type all
log_dest stdout
