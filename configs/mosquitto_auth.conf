# ================================================
# Mosquitto Config - Pha 2: BẢO MẬT CƠ BẢN (Auth + ACL)
# ================================================
# Yêu cầu username/password và phân quyền topic.

# Không cho phép anonymous
allow_anonymous false

# Lắng nghe trên port mặc định
listener 1883 0.0.0.0

# File chứa username/password (đã hash)
# Tạo bằng lệnh: mosquitto_passwd -c configs/passwords.txt sensor
password_file /mosquitto/config/passwords.txt

# File phân quyền topic
acl_file /mosquitto/config/acl.txt

# Log
log_type all
log_dest stdout
