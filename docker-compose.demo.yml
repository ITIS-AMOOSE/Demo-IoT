services:
  # ==========================
  # 3 BROKER CHẠY SONG SONG
  # ==========================
  mosquitto-open:
    build:
      context: .
      dockerfile: mosquitto.Dockerfile
    command: ["-c", "/mosquitto/config/mosquitto_open.conf"]
    ports:
      - "1883:1883"
    networks:
      default:
        aliases:
          - mosquitto
    restart: unless-stopped

  # ==========================
  # NODE-RED DASHBOARD (3 UI)
  # ==========================
  nodered-pha1:
    build: ./node_red
    ports:
      - "1880:1880"
    volumes:
      - nodered_pha1_data:/data
      - ./node_red/flow-export.json:/data/flows.json
      - ./node_red/flows_cred.json:/data/flows_cred.json
      - ./node_red/settings.js:/data/settings.js
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - MQTT_HOST=mosquitto-open
      - MQTT_PORT=1883
    depends_on:
      - mosquitto-open

  nodered-pha2:
    build: ./node_red
    ports:
      - "1881:1880"
    volumes:
      - nodered_pha2_data:/data
      - ./node_red/flow-export.json:/data/flows.json
      - ./node_red/flows_cred.json:/data/flows_cred.json
      - ./node_red/settings.js:/data/settings.js
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - MQTT_HOST=mosquitto-auth
      - MQTT_PORT=1883
    depends_on:
      - mosquitto-auth

  nodered-pha3:
    build: ./node_red
    ports:
      - "1882:1880"
    volumes:
      - nodered_pha3_data:/data
      - ./node_red/flow-pha3.json:/data/flows.json
      - ./node_red/flows_cred.json:/data/flows_cred.json
      - ./node_red/settings.js:/data/settings.js
      - ./certs:/data/certs
    environment:
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - mosquitto-tls

  mosquitto-auth:
    build:
      context: .
      dockerfile: mosquitto.Dockerfile
    command: ["-c", "/mosquitto/config/mosquitto_auth.conf"]
    ports:
      - "1884:1883"
    restart: unless-stopped

  mosquitto-tls:
    build:
      context: .
      dockerfile: mosquitto.Dockerfile
    command: ["-c", "/mosquitto/config/mosquitto_tls.conf"]
    ports:
      - "8883:8883"
    volumes:
      - ./certs:/mosquitto/certs
    restart: unless-stopped

  # ==========================
  # PHA 1 (OPEN)
  # ==========================
  sensor-open:
    build: .
    command: python sensor.py
    environment:
      - BROKER_HOST=mosquitto-open
    depends_on:
      - mosquitto-open

  attacker-open:
    build: .
    command: python attacker.py
    environment:
      - BROKER_HOST=mosquitto-open
    depends_on:
      - mosquitto-open

  subscriber-open:
    build: .
    command: python subscriber_test.py --mode open
    environment:
      - BROKER_HOST=mosquitto-open
    depends_on:
      - mosquitto-open

  # ==========================
  # PHA 2 (AUTH + ACL)
  # ==========================
  secure-sensor-auth-demo:
    build: .
    command: python secure_sensor.py --mode auth
    environment:
      - BROKER_HOST=mosquitto-auth
      - BROKER_PORT=1883
    depends_on:
      - mosquitto-auth

  secure-attacker-auth-demo:
    build: .
    command: python secure_attacker.py --mode auth
    environment:
      - BROKER_HOST=mosquitto-auth
      - BROKER_PORT=1883
    depends_on:
      - mosquitto-auth

  subscriber-auth-demo:
    build: .
    command: python subscriber_test.py --mode auth
    environment:
      - BROKER_HOST=mosquitto-auth
      - BROKER_PORT=1883
    depends_on:
      - mosquitto-auth

  # ==========================
  # PHA 3 (TLS + AUTH)
  # ==========================
  secure-sensor-tls-demo:
    build: .
    command: python secure_sensor.py --mode tls
    environment:
      - BROKER_HOST=mosquitto-tls
      - BROKER_TLS_PORT=8883
    volumes:
      - ./certs:/app/certs
    depends_on:
      - mosquitto-tls

  secure-attacker-tls-demo:
    build: .
    command: python secure_attacker.py --mode tls
    environment:
      - BROKER_HOST=mosquitto-tls
      - BROKER_TLS_PORT=8883
    volumes:
      - ./certs:/app/certs
    depends_on:
      - mosquitto-tls

  subscriber-tls-demo:
    build: .
    command: python subscriber_test.py --mode tls
    environment:
      - BROKER_HOST=mosquitto-tls
      - BROKER_TLS_PORT=8883
    volumes:
      - ./certs:/app/certs
    depends_on:
      - mosquitto-tls

volumes:
  nodered_pha1_data:
  nodered_pha2_data:
  nodered_pha3_data:
